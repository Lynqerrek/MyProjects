<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lynqerrek · Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07080f;
  --glass: rgba(255,255,255,0.04);
  --glass-hover: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.09);
  --glass-border-hover: rgba(255,255,255,0.18);
  --text: #eeedf5;
  --text-sec: #8e8d9e;
  --muted: #4e4d5c;
  --muted2: #2e2d38;

  /* gradient accent palette */
  --g1: #7c5cfc;   /* violet */
  --g2: #c55ff0;   /* purple-pink */
  --g3: #4facfe;   /* sky */
  --green: #34d399;

  --font: 'Outfit', sans-serif;
  --mono: 'DM Mono', monospace;
  --r: 16px;
  --r-sm: 10px;
  --r-xs: 7px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── AMBIENT BACKGROUND ─── */
.ambient {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

/* Main deep gradient base */
.ambient::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% -10%, rgba(124,92,252,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 110%, rgba(79,172,254,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(197,95,240,0.07) 0%, transparent 70%);
}

/* Drifting orb 1 – violet */
.orb1 {
  position: absolute;
  width: 520px; height: 520px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,92,252,0.22) 0%, transparent 70%);
  top: -160px; left: -100px;
  animation: drift1 18s ease-in-out infinite alternate;
  filter: blur(1px);
}

/* Drifting orb 2 – sky */
.orb2 {
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(79,172,254,0.16) 0%, transparent 70%);
  bottom: -120px; right: -80px;
  animation: drift2 22s ease-in-out infinite alternate;
  filter: blur(1px);
}

/* Subtle orb 3 – pink, mid-screen */
.orb3 {
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(197,95,240,0.1) 0%, transparent 70%);
  top: 45%; left: 55%;
  animation: drift3 26s ease-in-out infinite alternate;
}

@keyframes drift1 {
  0%   { transform: translate(0px, 0px) scale(1); }
  100% { transform: translate(60px, 80px) scale(1.12); }
}
@keyframes drift2 {
  0%   { transform: translate(0px, 0px) scale(1); }
  100% { transform: translate(-50px, -70px) scale(1.08); }
}
@keyframes drift3 {
  0%   { transform: translate(0px, 0px); }
  100% { transform: translate(-80px, 60px); }
}

/* Noise grain overlay */
.grain {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.38;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
}

/* ─── LAYOUT ─── */
.page {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ─── LOADER ─── */
#loader {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.ld-ring {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.08);
  border-top-color: var(--g1);
  animation: spin .9s linear infinite;
}

.ld-txt {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .2em;
  text-transform: uppercase;
}

.ld-txt em { font-style: normal; animation: blink 1s step-end infinite; }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ─── MAIN ─── */
#main { display: none; flex-direction: column; padding-top: 72px; padding-bottom: 88px; }

/* ─── HEADER ─── */
.hdr { margin-bottom: 48px; opacity: 0; animation: fu .7s ease forwards .05s; }

.hdr-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 28px 28px 24px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}

/* Subtle inner glow at top */
.hdr-card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(124,92,252,0.5), rgba(79,172,254,0.4), transparent);
}

.hdr-top { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 16px; }

/* Avatar with gradient ring */
.av-wrap {
  position: relative;
  flex-shrink: 0;
  padding: 3px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--g1), var(--g2), var(--g3));
}

.av-wrap img {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  border: 2.5px solid var(--bg);
  transition: transform .4s ease;
}

.av-wrap:hover img { transform: scale(1.04); }

.status {
  position: absolute;
  bottom: 5px; right: 5px;
  width: 13px; height: 13px;
  background: var(--green);
  border: 2.5px solid var(--bg);
  border-radius: 50%;
}
.status::after {
  content: '';
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  background: var(--green);
  opacity: .2;
  animation: pop 2.4s ease-out infinite;
}
@keyframes pop { 0%{transform:scale(.7);opacity:.3} 100%{transform:scale(2.3);opacity:0} }

.hdr-meta { flex: 1; min-width: 0; }

.hdr-name {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -.03em;
  line-height: 1.1;
  margin-bottom: 5px;
  background: linear-gradient(100deg, #ffffff 30%, rgba(196,181,253,0.9) 70%, rgba(147,197,253,0.8) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.gh-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
  margin-bottom: 10px;
}
.gh-link:hover { color: #a78bfa; }

.hdr-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.hdr-tag {
  font-size: 10.5px;
  padding: 3px 10px;
  border-radius: 100px;
  border: 1px solid var(--glass-border);
  color: var(--text-sec);
  background: rgba(255,255,255,0.04);
  font-weight: 400;
}

.bio {
  font-size: 13px;
  font-weight: 300;
  line-height: 1.7;
  color: var(--text-sec);
  margin: 16px 0 20px;
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 4px;
}

.stat {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-sm);
  padding: 13px 14px;
  transition: background .25s, border-color .25s;
  cursor: default;
}
.stat:hover {
  background: rgba(255,255,255,0.07);
  border-color: var(--glass-border-hover);
}
.stat-n {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-l {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: .14em;
  text-transform: uppercase;
}

/* ─── CONTROLS ─── */
.controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 14px;
  opacity: 0;
  animation: fu .6s ease forwards .32s;
}

.search-wrap { position: relative; }
.search-wrap i {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 12px;
  pointer-events: none;
}
#search {
  width: 100%;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-sm);
  padding: 11px 14px 11px 38px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  outline: none;
  transition: border-color .2s, background .2s;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
#search::placeholder { color: var(--muted); }
#search:focus { border-color: rgba(124,92,252,0.45); background: rgba(255,255,255,0.06); }

.ctrl-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

.pills { display: flex; gap: 5px; flex-wrap: wrap; }
.pill {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  padding: 5px 13px;
  border-radius: 100px;
  border: 1px solid var(--glass-border);
  background: transparent;
  color: var(--text-sec);
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
}
.pill:hover { border-color: var(--glass-border-hover); color: var(--text); }
.pill.on {
  background: linear-gradient(135deg, rgba(124,92,252,0.2), rgba(79,172,254,0.15));
  border-color: rgba(124,92,252,0.4);
  color: #c4b5fd;
}

.sort-wrap { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.sort-lbl {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
  white-space: nowrap;
}
#sort-btn {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: var(--r-xs);
  border: 1px solid var(--glass-border);
  background: var(--glass);
  color: var(--text-sec);
  cursor: pointer;
  transition: all .18s;
  display: flex; align-items: center; gap: 5px;
  backdrop-filter: blur(8px);
}
#sort-btn:hover { border-color: var(--glass-border-hover); color: var(--text); }
#sort-btn i { font-size: 9px; }

/* ─── COUNT ROW ─── */
.count-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  opacity: 0;
  animation: fu .5s ease forwards .46s;
}
.count-txt {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .05em;
}
.count-txt strong { color: var(--text-sec); font-weight: 500; }

/* ─── CARDS ─── */
#grid { display: flex; flex-direction: column; gap: 8px; }

.card {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--r);
  padding: 16px 18px;
  text-decoration: none;
  color: inherit;
  transition: background .25s, border-color .25s, transform .25s, box-shadow .25s;
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: fu .45s ease forwards;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

/* Shimmer sweep on hover */
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(100deg, transparent 30%, rgba(255,255,255,0.04) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform .6s ease;
}
.card:hover::before { transform: translateX(100%); }

.card:hover {
  background: rgba(255,255,255,0.07);
  border-color: var(--glass-border-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(124,92,252,0.08);
}

/* Featured card: gradient left border accent */
.card.feat {
  border-color: rgba(124,92,252,0.3);
  background: linear-gradient(110deg, rgba(124,92,252,0.07) 0%, var(--glass) 60%);
}
.card.feat::after {
  content: '';
  position: absolute;
  left: 0; top: 12%; bottom: 12%;
  width: 2px;
  border-radius: 2px;
  background: linear-gradient(180deg, var(--g1), var(--g2));
  opacity: .8;
}
.card.feat:hover { border-color: rgba(124,92,252,0.5); }

/* Icon */
.c-ico {
  width: 42px; height: 42px;
  border-radius: var(--r-sm);
  border: 1px solid var(--glass-border);
  background: rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
  transition: border-color .2s, background .2s;
}
.card:hover .c-ico { border-color: var(--glass-border-hover); background: rgba(255,255,255,0.07); }

/* Body */
.c-body { flex: 1; min-width: 0; }
.c-nrow { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; flex-wrap: wrap; }
.c-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color .2s;
  max-width: 260px;
  letter-spacing: -.01em;
}
.card:hover .c-name { color: #c4b5fd; }

.bdg {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 100px;
  flex-shrink: 0;
}
.bdg-feat {
  background: linear-gradient(135deg, rgba(124,92,252,0.18), rgba(79,172,254,0.12));
  border: 1px solid rgba(124,92,252,0.35);
  color: #a78bfa;
}
.bdg-new {
  background: rgba(52,211,153,0.1);
  border: 1px solid rgba(52,211,153,0.28);
  color: #34d399;
}

.c-desc {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-sec);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}

/* Right side */
.c-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  flex-shrink: 0;
}
.c-lang {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .04em;
  white-space: nowrap;
}
.c-time {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted2);
  white-space: nowrap;
}
.c-arr {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 10px;
  transition: all .22s;
}
.card:hover .c-arr {
  border-color: rgba(124,92,252,0.5);
  color: #a78bfa;
  background: rgba(124,92,252,0.12);
}

/* ─── EMPTY ─── */
.empty {
  text-align: center;
  padding: 52px 24px;
  border: 1px dashed var(--glass-border);
  border-radius: var(--r);
  color: var(--muted);
}
.empty p { font-size: 13px; margin-top: 8px; }

/* ─── DIVIDER ─── */
.section-divider {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
  opacity: 0;
  animation: fu .55s ease forwards .44s;
}
.section-divider span {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(124,92,252,0.25), transparent);
}

/* ─── FOOTER ─── */
footer {
  margin-top: 56px;
  padding-top: 22px;
  border-top: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  opacity: 0;
  animation: fu .5s ease forwards 1.5s;
}
.ft-l {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
}
.ft-r { display: flex; gap: 16px; }
.ft-r a {
  color: var(--muted);
  font-size: 15px;
  text-decoration: none;
  transition: color .2s;
}
.ft-r a:hover { color: var(--text); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 10px; }

@keyframes fu { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

/* ─── RESPONSIVE ─── */
@media (max-width: 520px) {
  .hdr-name { font-size: 22px; }
  .stat-n { font-size: 19px; }
  .c-desc { display: none; }
  .c-time { display: none; }
  .c-name { max-width: 150px; }
  .hdr-card { padding: 20px 18px; }
}
</style>
</head>
<body>

<div class="ambient">
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>
</div>
<div class="grain"></div>

<div class="page">

  <!-- Loader -->
  <div id="loader">
    <div class="ld-ring"></div>
    <p class="ld-txt">Loading projects<em>_</em></p>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Profile Header -->
    <header class="hdr">
      <div class="hdr-card">
        <div class="hdr-top">
          <div class="av-wrap">
            <img id="av" src="" alt="Avatar">
            <div class="status"></div>
          </div>
          <div class="hdr-meta">
            <h1 class="hdr-name" id="uname"></h1>
            <a id="ghlink" href="#" target="_blank" class="gh-link">
              <i class="fa-brands fa-github"></i>
              <span id="login"></span>
            </a>
            <div class="hdr-tags" id="hdr-tags"></div>
          </div>
        </div>
        <p id="bio" class="bio"></p>
        <div class="stats">
          <div class="stat">
            <div id="s-repos" class="stat-n">—</div>
            <div class="stat-l">Repos</div>
          </div>
          <div class="stat">
            <div id="s-live" class="stat-n">—</div>
            <div class="stat-l">Live</div>
          </div>
          <div class="stat">
            <div id="s-followers" class="stat-n">—</div>
            <div class="stat-l">Followers</div>
          </div>
        </div>
      </div>
    </header>

    <!-- Controls -->
    <div class="controls">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="search" type="text" placeholder="Search projects…" autocomplete="off">
      </div>
      <div class="ctrl-row">
        <div class="pills" id="pills"></div>
        <div class="sort-wrap">
          <span class="sort-lbl">Sort</span>
          <button id="sort-btn">
            <span id="sort-lbl-txt">Newest</span>
            <i class="fa-solid fa-arrow-down-wide-short" id="sort-ico"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Section heading + count -->
    <div class="section-divider">
      <span>Projects</span>
      <div class="divider-line"></div>
      <span><strong id="count">0</strong> live</span>
    </div>

    <!-- Cards -->
    <div id="grid"></div>

    <!-- Footer -->
    <footer>
      <span class="ft-l">GitHub API v3</span>
      <div class="ft-r">
        <a href="https://github.com/lynqerrek" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
      </div>
    </footer>

  </div>
</div>

<script>
const U = 'lynqerrek';
const HIDDEN = ['myprojects', 'my-projects', 'my_projects'];
const $ = id => document.getElementById(id);
let repos = [], pinned = new Set(), langFilter = 'all', sortDir = 'desc', query = '';

window.addEventListener('DOMContentLoaded', boot);

async function boot() {
  try {
    const [uR, rR, pR] = await Promise.allSettled([
      fetch(`https://api.github.com/users/${U}`),
      fetch(`https://api.github.com/users/${U}/repos?sort=pushed&per_page=100&type=owner`),
      fetch(`https://gh-pinned-repos.egoist.dev/?username=${U}`)
    ]);
    if (uR.status === 'rejected' || !uR.value.ok) throw new Error('User not found');
    if (rR.status === 'rejected' || !rR.value.ok) throw new Error('Repos not found');

    const user = await uR.value.json();
    const raw = await rR.value.json();

    if (pR.status === 'fulfilled' && pR.value.ok) {
      try { const pd = await pR.value.json(); pd.forEach(p => pinned.add(p.repo)); } catch (_) {}
    }

    renderProfile(user);

    repos = raw
      .filter(r => r.has_pages && !HIDDEN.includes(r.name.toLowerCase()))
      .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at));

    $('s-live').textContent = repos.length;
    buildPills();
    buildSort();
    $('search').addEventListener('input', e => { query = e.target.value.toLowerCase().trim(); render(); });
    render();

    setTimeout(() => {
      $('loader').style.display = 'none';
      $('main').style.display = 'flex';
    }, 500);

  } catch (e) {
    $('loader').innerHTML = `<div style="text-align:center;color:var(--muted)">
      <div style="font-size:22px;margin-bottom:12px;opacity:.5">!</div>
      <p style="font-family:var(--mono);font-size:11px">${e.message}</p></div>`;
  }
}

function renderProfile(u) {
  $('av').src = u.avatar_url;
  $('uname').textContent = u.name || u.login;
  $('login').textContent = '@' + u.login;
  $('ghlink').href = u.html_url;
  $('bio').textContent = u.bio || 'Building digital experiences.';
  $('s-repos').textContent = u.public_repos;
  $('s-followers').textContent = u.followers;
  const tags = $('hdr-tags');
  if (u.location) {
    const t = document.createElement('span'); t.className = 'hdr-tag';
    t.innerHTML = `<i class="fa-solid fa-location-dot" style="font-size:9px;margin-right:4px;opacity:.7"></i>${u.location}`;
    tags.appendChild(t);
  }
  if (u.company) {
    const t = document.createElement('span'); t.className = 'hdr-tag';
    t.textContent = u.company; tags.appendChild(t);
  }
}

function buildPills() {
  const langs = ['all', ...new Set(repos.map(r => r.language).filter(Boolean))];
  const row = $('pills');
  langs.forEach(lang => {
    const b = document.createElement('button');
    b.className = 'pill' + (lang === 'all' ? ' on' : '');
    b.textContent = lang === 'all' ? 'All' : lang;
    b.addEventListener('click', () => {
      langFilter = lang;
      row.querySelectorAll('.pill').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      render();
    });
    row.appendChild(b);
  });
}

function buildSort() {
  $('sort-btn').addEventListener('click', () => {
    sortDir = sortDir === 'desc' ? 'asc' : 'desc';
    $('sort-lbl-txt').textContent = sortDir === 'desc' ? 'Newest' : 'Oldest';
    $('sort-ico').className = 'fa-solid ' + (sortDir === 'desc' ? 'fa-arrow-down-wide-short' : 'fa-arrow-up-wide-short');
    render();
  });
}

function render() {
  let list = [...repos];
  if (langFilter !== 'all') list = list.filter(r => r.language === langFilter);
  if (query) list = list.filter(r =>
    r.name.toLowerCase().includes(query) ||
    (r.description || '').toLowerCase().includes(query) ||
    (r.language || '').toLowerCase().includes(query)
  );
  list.sort((a, b) => {
    const d = new Date(b.pushed_at) - new Date(a.pushed_at);
    return sortDir === 'desc' ? d : -d;
  });

  $('count').textContent = list.length;
  const grid = $('grid');
  grid.innerHTML = '';

  if (!list.length) {
    grid.innerHTML = `<div class="empty"><p>No projects match.</p></div>`;
    return;
  }

  const now = Date.now();
  list.forEach((repo, i) => {
    const isFeat = pinned.has(repo.name);
    const isNew = (now - new Date(repo.pushed_at)) < 1000 * 60 * 60 * 24 * 30;
    let url = repo.homepage || `https://${U}.github.io/${repo.name}/`;
    if (url && !url.startsWith('http')) url = 'https://' + url;

    const card = document.createElement('a');
    card.href = url;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.className = 'card' + (isFeat ? ' feat' : '');
    card.style.animationDelay = `${0.1 + i * 0.055}s`;

    card.innerHTML = `
      <div class="c-ico" style="color:${lc(repo.language)}">${li(repo.language)}</div>
      <div class="c-body">
        <div class="c-nrow">
          <span class="c-name">${fmt(repo.name)}</span>
          ${isFeat ? '<span class="bdg bdg-feat">Featured</span>' : ''}
          ${isNew ? '<span class="bdg bdg-new">New</span>' : ''}
        </div>
        <p class="c-desc">${repo.description || 'No description provided.'}</p>
      </div>
      <div class="c-right">
        ${repo.language ? `<span class="c-lang">${repo.language}</span>` : ''}
        <span class="c-time">${ago(repo.pushed_at)}</span>
        <div class="c-arr"><i class="fa-solid fa-arrow-up-right"></i></div>
      </div>`;

    grid.appendChild(card);
  });
}

function ago(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  if (s < 2592000) return `${Math.floor(s/86400)}d ago`;
  if (s < 31536000) return `${Math.floor(s/2592000)}mo ago`;
  return `${Math.floor(s/31536000)}y ago`;
}

function fmt(n) { return n.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }

function lc(l) {
  if (!l) return '#5a5960';
  return { HTML:'#e34c26', CSS:'#7c5cfc', JavaScript:'#f0cc50', TypeScript:'#4facfe',
    Python:'#4b8bbe', Java:'#b07219', Vue:'#41b883', PHP:'#818cf8',
    'C++':'#f472b6', 'C#':'#34d399' }[l] || '#5a5960';
}

function li(l) {
  if (!l) return '<i class="fa-solid fa-code"></i>';
  return { HTML:'<i class="fa-brands fa-html5"></i>', CSS:'<i class="fa-brands fa-css3-alt"></i>',
    JavaScript:'<i class="fa-brands fa-js"></i>', TypeScript:'<i class="fa-brands fa-js"></i>',
    Python:'<i class="fa-brands fa-python"></i>', Java:'<i class="fa-brands fa-java"></i>',
    PHP:'<i class="fa-brands fa-php"></i>', Vue:'<i class="fa-brands fa-vuejs"></i>',
    React:'<i class="fa-brands fa-react"></i>' }[l] || '<i class="fa-solid fa-terminal"></i>';
}
</script>
</body>

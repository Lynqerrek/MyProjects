<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lynqerrek · Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0e;
    --surface: #131316;
    --surface2: #1a1a1f;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0eff4;
    --muted: #6b6a72;
    --muted2: #44434a;
    --accent: #e8e2ff;
    --accent-dim: rgba(232,226,255,0.12);
    --accent-border: rgba(232,226,255,0.2);
    --green: #3ddc84;
    --green-dim: rgba(61,220,132,0.1);
    --font-mono: 'DM Mono', monospace;
    --font-display: 'Syne', sans-serif;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.5;
  }

  /* Ambient light */
  body::after {
    content: '';
    position: fixed;
    top: -30vh;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    height: 60vh;
    background: radial-gradient(ellipse, rgba(120, 90, 255, 0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ——— LOADER ——— */
  #loader {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .loader-ring {
    width: 40px;
    height: 40px;
    border: 1px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  .loader-text {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .loader-text span {
    animation: blink 1s step-end infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* ——— MAIN CONTENT ——— */
  #profile-content {
    display: none;
    flex-direction: column;
    padding-top: 72px;
    padding-bottom: 80px;
  }

  /* ——— HEADER ——— */
  .profile-header {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.1s;
  }

  .avatar-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }

  .avatar-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .avatar-wrap img {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 1px solid var(--border);
    object-fit: cover;
    display: block;
    filter: grayscale(20%);
    transition: filter 0.3s;
  }

  .avatar-wrap img:hover { filter: grayscale(0%); }

  .status-dot {
    position: absolute;
    bottom: 3px;
    right: 3px;
    width: 12px;
    height: 12px;
    background: var(--green);
    border: 2px solid var(--bg);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(61,220,132,0.5);
  }

  .status-dot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: var(--green);
    opacity: 0.25;
    animation: pulse 2s ease-out infinite;
  }

  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.4; }
    100% { transform: scale(2); opacity: 0; }
  }

  .name-block h1 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 6px;
  }

  .gh-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .gh-link:hover { color: var(--accent); }

  .bio {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--muted);
    margin-bottom: 28px;
    max-width: 480px;
  }

  /* Stats */
  .stats-row {
    display: flex;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    width: 100%;
  }

  .stat {
    flex: 1;
    background: var(--surface);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: background 0.2s;
  }

  .stat:hover { background: var(--surface2); }

  .stat-val {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ——— SECTION HEADER ——— */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.3s;
  }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--muted2);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ——— FILTER TABS ——— */
  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.4s;
  }

  .filter-btn {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .filter-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent-border);
    color: var(--accent);
  }

  /* ——— PROJECT CARDS ——— */
  #links-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .project-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    text-decoration: none;
    color: inherit;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }

  .project-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.02), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  .project-card:hover {
    border-color: var(--border-hover);
    background: var(--surface2);
    transform: translateX(3px);
  }

  .project-card:hover::before {
    transform: translateX(100%);
  }

  .project-card.is-featured {
    border-color: var(--accent-border);
    background: linear-gradient(135deg, var(--surface) 0%, rgba(130,100,255,0.05) 100%);
  }

  .project-card.is-featured:hover {
    border-color: rgba(232,226,255,0.35);
  }

  /* Icon */
  .project-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }

  .project-card:hover .project-icon {
    border-color: var(--border-hover);
  }

  /* Text */
  .project-info {
    flex: 1;
    min-width: 0;
  }

  .project-name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .project-name {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s;
  }

  .project-card:hover .project-name { color: var(--accent); }

  .featured-badge {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 100px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    color: var(--accent);
    flex-shrink: 0;
  }

  .project-desc {
    font-size: 12px;
    font-weight: 300;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  /* Meta */
  .project-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }

  .lang-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .arrow-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted2);
    font-size: 10px;
    transition: all 0.2s;
  }

  .project-card:hover .arrow-icon {
    border-color: var(--accent-border);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* ——— EMPTY STATE ——— */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    color: var(--muted);
  }

  .empty-state p { font-size: 13px; margin-top: 8px; }

  /* ——— FOOTER ——— */
  .site-footer {
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.2s;
  }

  .footer-tag {
    font-size: 10px;
    color: var(--muted2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .footer-links {
    display: flex;
    gap: 16px;
  }

  .footer-links a {
    color: var(--muted2);
    font-size: 14px;
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer-links a:hover { color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 10px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ——— RESPONSIVE ——— */
  @media (max-width: 480px) {
    .name-block h1 { font-size: 22px; }
    .stat-val { font-size: 18px; }
    .project-desc { display: none; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Loader -->
  <div id="loader">
    <div class="loader-ring"></div>
    <p class="loader-text">Fetching repositories<span>_</span></p>
  </div>

  <!-- Main Content -->
  <div id="profile-content">

    <!-- Header -->
    <header class="profile-header">
      <div class="avatar-row">
        <div class="avatar-wrap">
          <img id="avatar" src="" alt="Avatar">
          <div class="status-dot"></div>
        </div>
        <div class="name-block">
          <h1 id="display-name"></h1>
          <a id="profile-link" href="#" target="_blank" class="gh-link">
            <i class="fa-brands fa-github" style="font-size:13px;"></i>
            <span id="display-username"></span>
          </a>
        </div>
      </div>

      <p id="bio" class="bio"></p>

      <div class="stats-row">
        <div class="stat">
          <span id="total-repos" class="stat-val">—</span>
          <span class="stat-label">Repos</span>
        </div>
        <div class="stat">
          <span id="deployed-projects" class="stat-val">—</span>
          <span class="stat-label">Live</span>
        </div>
        <div class="stat">
          <span id="followers-count" class="stat-val">—</span>
          <span class="stat-label">Followers</span>
        </div>
      </div>
    </header>

    <!-- Projects -->
    <section>
      <div class="section-header">
        <span class="section-label">Projects</span>
        <div class="section-line"></div>
      </div>

      <!-- Filter row (populated by JS) -->
      <div class="filter-row" id="filter-row"></div>

      <div id="links-container"></div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
      <span class="footer-tag">github api v3</span>
      <div class="footer-links">
        <a href="https://github.com/lynqerrek" target="_blank"><i class="fa-brands fa-github"></i></a>
      </div>
    </footer>

  </div>

</div>

<script>
const USERNAME = 'lynqerrek';

const $ = id => document.getElementById(id);
let allRepos = [];
let pinnedSet = new Set();
let activeFilter = 'all';

window.addEventListener('DOMContentLoaded', init);

async function init() {
  try {
    const [userRes, reposRes, pinnedRes] = await Promise.allSettled([
      fetch(`https://api.github.com/users/${USERNAME}`),
      fetch(`https://api.github.com/users/${USERNAME}/repos?sort=updated&per_page=100&type=owner`),
      fetch(`https://gh-pinned-repos.egoist.dev/?username=${USERNAME}`)
    ]);

    if (userRes.status === 'rejected' || !userRes.value.ok) throw new Error('Could not load user');
    if (reposRes.status === 'rejected' || !reposRes.value.ok) throw new Error('Could not load repos');

    const user = await userRes.value.json();
    const repos = await reposRes.value.json();

    if (pinnedRes.status === 'fulfilled' && pinnedRes.value.ok) {
      try {
        const pinned = await pinnedRes.value.json();
        pinned.forEach(p => pinnedSet.add(p.repo));
      } catch (_) {}
    }

    renderProfile(user);

    allRepos = repos
      .filter(r => r.has_pages)
      .sort((a, b) => {
        const ap = pinnedSet.has(a.name), bp = pinnedSet.has(b.name);
        if (ap && !bp) return -1;
        if (!ap && bp) return 1;
        return new Date(b.updated_at) - new Date(a.updated_at);
      });

    $('deployed-projects').textContent = allRepos.length;
    buildFilters();
    renderLinks(allRepos);

    setTimeout(() => {
      $('loader').style.display = 'none';
      const content = $('profile-content');
      content.style.display = 'flex';
    }, 600);

  } catch (err) {
    $('loader').innerHTML = `
      <div style="text-align:center;color:#6b6a72;">
        <div style="font-size:24px;margin-bottom:12px;">⚠</div>
        <p style="font-size:12px;">${err.message}</p>
      </div>`;
  }
}

function renderProfile(user) {
  $('avatar').src = user.avatar_url;
  $('display-name').textContent = user.name || user.login;
  $('display-username').textContent = '@' + user.login;
  $('profile-link').href = user.html_url;
  $('bio').textContent = user.bio || 'Building digital experiences.';
  $('total-repos').textContent = user.public_repos;
  $('followers-count').textContent = user.followers;
}

function buildFilters() {
  const langs = ['all', ...new Set(allRepos.map(r => r.language).filter(Boolean))];
  const row = $('filter-row');
  row.innerHTML = '';
  langs.forEach(lang => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (lang === 'all' ? ' active' : '');
    btn.textContent = lang === 'all' ? 'All' : lang;
    btn.addEventListener('click', () => {
      activeFilter = lang;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = lang === 'all' ? allRepos : allRepos.filter(r => r.language === lang);
      renderLinks(filtered);
    });
    row.appendChild(btn);
  });
}

function renderLinks(repos) {
  const container = $('links-container');
  container.innerHTML = '';

  if (repos.length === 0) {
    container.innerHTML = `<div class="empty-state"><p>No projects found.</p></div>`;
    return;
  }

  repos.forEach((repo, i) => {
    const isPinned = pinnedSet.has(repo.name);
    let url = repo.homepage || `https://${USERNAME}.github.io/${repo.name}/`;
    if (url && !url.startsWith('http')) url = 'https://' + url;

    const card = document.createElement('a');
    card.href = url;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.className = 'project-card' + (isPinned ? ' is-featured' : '');
    card.style.animationDelay = `${0.2 + i * 0.07}s`;

    const featBadge = isPinned
      ? `<span class="featured-badge">Featured</span>`
      : '';

    card.innerHTML = `
      <div class="project-icon" style="color:${getLangColor(repo.language)}">
        ${getLangIcon(repo.language)}
      </div>
      <div class="project-info">
        <div class="project-name-row">
          <span class="project-name">${formatName(repo.name)}</span>
          ${featBadge}
        </div>
        <p class="project-desc">${repo.description || 'No description provided.'}</p>
      </div>
      <div class="project-meta">
        ${repo.language ? `<span class="lang-tag">${repo.language}</span>` : ''}
        <div class="arrow-icon"><i class="fa-solid fa-arrow-up-right"></i></div>
      </div>
    `;

    container.appendChild(card);
  });
}

function formatName(n) {
  return n.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function getLangColor(lang) {
  if (!lang) return '#6b6a72';
  const map = {
    'HTML': '#e34c26', 'CSS': '#563d7c', 'JavaScript': '#f1e05a',
    'TypeScript': '#3178c6', 'Python': '#3572A5', 'Java': '#b07219',
    'Vue': '#41b883', 'React': '#61dafb', 'PHP': '#4F5D95', 'C++': '#f34b7d', 'C#': '#178600'
  };
  return map[lang] || '#6b6a72';
}

function getLangIcon(lang) {
  if (!lang) return '<i class="fa-solid fa-code"></i>';
  const map = {
    'HTML': '<i class="fa-brands fa-html5"></i>',
    'CSS': '<i class="fa-brands fa-css3-alt"></i>',
    'JavaScript': '<i class="fa-brands fa-js"></i>',
    'TypeScript': '<i class="fa-brands fa-js"></i>',
    'Python': '<i class="fa-brands fa-python"></i>',
    'Java': '<i class="fa-brands fa-java"></i>',
    'PHP': '<i class="fa-brands fa-php"></i>',
    'Vue': '<i class="fa-brands fa-vuejs"></i>',
    'React': '<i class="fa-brands fa-react"></i>',
  };
  return map[lang] || '<i class="fa-solid fa-terminal"></i>';
}
</script>
</body>
</html>

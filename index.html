<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lynqerrek · Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--surface:#131316;--surface2:#1c1c22;
  --border:rgba(255,255,255,0.07);--border-mid:rgba(255,255,255,0.12);--border-high:rgba(255,255,255,0.2);
  --text:#f0eff4;--text-sec:#9b9aa3;--muted:#5a5960;--muted2:#36353c;
  --accent:#c4b5fd;--accent-dim:rgba(196,181,253,0.1);--accent-border:rgba(196,181,253,0.22);
  --green:#3ddc84;--font-mono:'DM Mono',monospace;--font-disp:'Syne',sans-serif;
  --r:10px;--r-sm:7px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");opacity:.6}
body::after{content:'';position:fixed;top:-20vh;left:50%;transform:translateX(-50%);width:70vw;height:50vh;
  background:radial-gradient(ellipse,rgba(100,70,220,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:660px;margin:0 auto;padding:0 22px}

/* LOADER */
#loader{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.ld-ring{width:36px;height:36px;border:1px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite}
.ld-txt{font-size:10px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase}
.ld-txt em{font-style:normal;animation:blink 1s step-end infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* MAIN */
#main{display:none;flex-direction:column;padding-top:64px;padding-bottom:80px}

/* HEADER */
.hdr{margin-bottom:44px;opacity:0;animation:fu .6s ease forwards .05s}
.hdr-top{display:flex;align-items:flex-start;gap:18px;margin-bottom:18px}
.av-wrap{position:relative;flex-shrink:0}
.av-wrap img{width:68px;height:68px;border-radius:50%;border:1px solid var(--border-mid);object-fit:cover;display:block;transition:filter .4s}
.av-wrap img:hover{filter:brightness(1.1)}
.status{position:absolute;bottom:2px;right:2px;width:13px;height:13px;background:var(--green);border:2.5px solid var(--bg);border-radius:50%}
.status::after{content:'';position:absolute;inset:-5px;border-radius:50%;background:var(--green);opacity:.2;animation:pop 2.2s ease-out infinite}
@keyframes pop{0%{transform:scale(.7);opacity:.35}100%{transform:scale(2.2);opacity:0}}
.hdr-meta{flex:1;min-width:0}
.hdr-meta h1{font-family:var(--font-disp);font-size:24px;font-weight:800;letter-spacing:-.025em;color:var(--text);margin-bottom:4px;line-height:1.1}
.gh-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);text-decoration:none;transition:color .2s;margin-bottom:10px}
.gh-link:hover{color:var(--accent)}
.hdr-tags{display:flex;gap:6px;flex-wrap:wrap}
.hdr-tag{font-size:10px;padding:3px 9px;border-radius:100px;border:1px solid var(--border);color:var(--muted);background:var(--surface)}
.bio{font-size:12.5px;font-weight:300;line-height:1.75;color:var(--text-sec);margin-bottom:22px;font-style:italic}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
.stat{background:var(--surface);padding:13px 14px;transition:background .2s;cursor:default}
.stat:hover{background:var(--surface2)}
.stat-n{font-family:var(--font-disp);font-size:21px;font-weight:800;color:var(--text);line-height:1}
.stat-l{font-size:9.5px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}

/* CONTROLS */
.controls{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;opacity:0;animation:fu .55s ease forwards .3s}
.search-wrap{position:relative}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
#search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px 9px 34px;font-family:var(--font-mono);font-size:12px;color:var(--text);outline:none;transition:border-color .2s}
#search::placeholder{color:var(--muted)}
#search:focus{border-color:var(--border-mid)}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{font-family:var(--font-mono);font-size:10.5px;padding:4px 11px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap}
.pill:hover{border-color:var(--border-mid);color:var(--text)}
.pill.on{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.sort-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.sort-lbl{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
#sort-btn{font-family:var(--font-mono);font-size:10.5px;padding:4px 10px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-sec);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px}
#sort-btn:hover{border-color:var(--border-mid);color:var(--text)}
#sort-btn i{font-size:9px}

/* COUNT ROW */
.count-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;opacity:0;animation:fu .5s ease forwards .45s}
.count-txt{font-size:10px;color:var(--muted);letter-spacing:.04em}
.count-txt strong{color:var(--text-sec);font-weight:500}

/* CARDS */
#grid{display:flex;flex-direction:column;gap:7px}
.card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;text-decoration:none;color:inherit;transition:border-color .2s,background .2s,transform .2s;position:relative;overflow:hidden;opacity:0;animation:fu .45s ease forwards}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.017),transparent);transform:translateX(-100%);transition:transform .55s ease}
.card:hover{border-color:var(--border-mid);background:var(--surface2);transform:translateX(4px)}
.card:hover::after{transform:translateX(100%)}
.card.feat{border-color:var(--accent-border);background:linear-gradient(120deg,var(--surface) 60%,rgba(110,80,200,0.06) 100%)}
.card.feat:hover{border-color:rgba(196,181,253,.36)}
.c-ico{width:38px;height:38px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:border-color .2s}
.card:hover .c-ico{border-color:var(--border-mid)}
.c-body{flex:1;min-width:0}
.c-nrow{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap}
.c-name{font-family:var(--font-disp);font-size:14.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s;max-width:260px}
.card:hover .c-name{color:var(--accent)}
.bdg{font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:100px;flex-shrink:0}
.bdg-feat{background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent)}
.bdg-new{background:rgba(61,220,132,0.1);border:1px solid rgba(61,220,132,0.25);color:#3ddc84}
.c-desc{font-size:11.5px;font-weight:300;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.c-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0}
.c-lang{font-size:10px;color:var(--muted);letter-spacing:.04em;white-space:nowrap}
.c-time{font-size:10px;color:var(--muted2);white-space:nowrap}
.c-arr{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted2);font-size:9px;transition:all .2s}
.card:hover .c-arr{border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim)}

/* EMPTY */
.empty{text-align:center;padding:44px 20px;border:1px dashed var(--border);border-radius:var(--r);color:var(--muted)}
.empty p{font-size:12px;margin-top:6px}

/* FOOTER */
footer{margin-top:52px;padding-top:20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;opacity:0;animation:fu .5s ease forwards 1.4s}
.ft-l{font-size:9.5px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase}
.ft-r{display:flex;gap:14px}
.ft-r a{color:var(--muted2);font-size:14px;text-decoration:none;transition:color .2s}
.ft-r a:hover{color:var(--text)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:10px}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){
  .hdr-meta h1{font-size:20px}.stat-n{font-size:18px}
  .c-desc{display:none}.c-time{display:none}.c-name{max-width:150px}
}
</style>
</head>
<body>
<div class="wrap">

<div id="loader">
  <div class="ld-ring"></div>
  <p class="ld-txt">Loading projects<em>_</em></p>
</div>

<div id="main">
  <header class="hdr">
    <div class="hdr-top">
      <div class="av-wrap">
        <img id="av" src="" alt="Avatar">
        <div class="status"></div>
      </div>
      <div class="hdr-meta">
        <h1 id="uname"></h1>
        <a id="ghlink" href="#" target="_blank" class="gh-link">
          <i class="fa-brands fa-github"></i><span id="login"></span>
        </a>
        <div class="hdr-tags" id="hdr-tags"></div>
      </div>
    </div>
    <p id="bio" class="bio"></p>
    <div class="stats">
      <div class="stat"><div id="s-repos" class="stat-n">—</div><div class="stat-l">Repos</div></div>
      <div class="stat"><div id="s-live" class="stat-n">—</div><div class="stat-l">Live</div></div>
      <div class="stat"><div id="s-followers" class="stat-n">—</div><div class="stat-l">Followers</div></div>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="search" type="text" placeholder="Search projects…" autocomplete="off">
    </div>
    <div class="ctrl-row">
      <div class="pills" id="pills"></div>
      <div class="sort-wrap">
        <span class="sort-lbl">Sort</span>
        <button id="sort-btn">
          <span id="sort-lbl-txt">Newest</span>
          <i class="fa-solid fa-arrow-down-wide-short" id="sort-ico"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="count-row">
    <span class="count-txt"><strong id="count">0</strong> projects</span>
  </div>

  <div id="grid"></div>

  <footer>
    <span class="ft-l">GitHub API v3</span>
    <div class="ft-r">
      <a href="https://github.com/lynqerrek" target="_blank"><i class="fa-brands fa-github"></i></a>
    </div>
  </footer>
</div>

</div>
<script>
const U='lynqerrek';
const HIDDEN=['myprojects','my-projects','my_projects'];
const $=id=>document.getElementById(id);
let repos=[],pinned=new Set(),langFilter='all',sortDir='desc',query='';

window.addEventListener('DOMContentLoaded',boot);

async function boot(){
  try{
    const [uR,rR,pR]=await Promise.allSettled([
      fetch(`https://api.github.com/users/${U}`),
      fetch(`https://api.github.com/users/${U}/repos?sort=pushed&per_page=100&type=owner`),
      fetch(`https://gh-pinned-repos.egoist.dev/?username=${U}`)
    ]);
    if(uR.status==='rejected'||!uR.value.ok) throw new Error('User not found');
    if(rR.status==='rejected'||!rR.value.ok) throw new Error('Repos not found');
    const user=await uR.value.json();
    const raw=await rR.value.json();
    if(pR.status==='fulfilled'&&pR.value.ok){
      try{const pd=await pR.value.json();pd.forEach(p=>pinned.add(p.repo))}catch(_){}
    }
    renderProfile(user);
    repos=raw
      .filter(r=>r.has_pages && !HIDDEN.includes(r.name.toLowerCase()))
      .sort((a,b)=>new Date(b.pushed_at)-new Date(a.pushed_at));
    $('s-live').textContent=repos.length;
    buildPills();
    buildSort();
    $('search').addEventListener('input',e=>{query=e.target.value.toLowerCase().trim();render();});
    render();
    setTimeout(()=>{$('loader').style.display='none';$('main').style.display='flex';},500);
  }catch(e){
    $('loader').innerHTML=`<div style="text-align:center;color:var(--muted)"><div style="font-size:22px;margin-bottom:10px">!</div><p style="font-size:11px">${e.message}</p></div>`;
  }
}

function renderProfile(u){
  $('av').src=u.avatar_url;
  $('uname').textContent=u.name||u.login;
  $('login').textContent='@'+u.login;
  $('ghlink').href=u.html_url;
  $('bio').textContent=u.bio||'Building digital experiences.';
  $('s-repos').textContent=u.public_repos;
  $('s-followers').textContent=u.followers;
  const tags=$('hdr-tags');
  [u.location&&`<i class="fa-solid fa-location-dot" style="font-size:9px;margin-right:4px"></i>${u.location}`,u.company].filter(Boolean).forEach(txt=>{
    const s=document.createElement('span');s.className='hdr-tag';s.innerHTML=txt;tags.appendChild(s);
  });
}

function buildPills(){
  const langs=['all',...new Set(repos.map(r=>r.language).filter(Boolean))];
  const row=$('pills');
  langs.forEach(lang=>{
    const b=document.createElement('button');
    b.className='pill'+(lang==='all'?' on':'');
    b.textContent=lang==='all'?'All':lang;
    b.addEventListener('click',()=>{
      langFilter=lang;
      row.querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');render();
    });
    row.appendChild(b);
  });
}

function buildSort(){
  $('sort-btn').addEventListener('click',()=>{
    sortDir=sortDir==='desc'?'asc':'desc';
    $('sort-lbl-txt').textContent=sortDir==='desc'?'Newest':'Oldest';
    $('sort-ico').className='fa-solid '+(sortDir==='desc'?'fa-arrow-down-wide-short':'fa-arrow-up-wide-short');
    render();
  });
}

function render(){
  let list=[...repos];
  if(langFilter!=='all') list=list.filter(r=>r.language===langFilter);
  if(query) list=list.filter(r=>
    r.name.toLowerCase().includes(query)||(r.description||'').toLowerCase().includes(query)||(r.language||'').toLowerCase().includes(query)
  );
  list.sort((a,b)=>{const d=new Date(b.pushed_at)-new Date(a.pushed_at);return sortDir==='desc'?d:-d;});
  $('count').textContent=list.length;
  const grid=$('grid');
  grid.innerHTML='';
  if(!list.length){grid.innerHTML=`<div class="empty"><p>No projects match.</p></div>`;return;}
  const now=Date.now();
  list.forEach((repo,i)=>{
    const isFeat=pinned.has(repo.name);
    const isNew=(now-new Date(repo.pushed_at))<1000*60*60*24*30;
    let url=repo.homepage||`https://${U}.github.io/${repo.name}/`;
    if(url&&!url.startsWith('http')) url='https://'+url;
    const card=document.createElement('a');
    card.href=url;card.target='_blank';card.rel='noopener noreferrer';
    card.className='card'+(isFeat?' feat':'');
    card.style.animationDelay=`${0.1+i*0.05}s`;
    card.innerHTML=`
      <div class="c-ico" style="color:${lc(repo.language)}">${li(repo.language)}</div>
      <div class="c-body">
        <div class="c-nrow">
          <span class="c-name">${fmt(repo.name)}</span>
          ${isFeat?'<span class="bdg bdg-feat">Featured</span>':''}
          ${isNew?'<span class="bdg bdg-new">New</span>':''}
        </div>
        <p class="c-desc">${repo.description||'No description provided.'}</p>
      </div>
      <div class="c-right">
        ${repo.language?`<span class="c-lang">${repo.language}</span>`:''}
        <span class="c-time">${ago(repo.pushed_at)}</span>
        <div class="c-arr"><i class="fa-solid fa-arrow-up-right"></i></div>
      </div>`;
    grid.appendChild(card);
  });
}

function ago(iso){
  const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)return'just now';if(s<3600)return`${Math.floor(s/60)}m ago`;
  if(s<86400)return`${Math.floor(s/3600)}h ago`;if(s<2592000)return`${Math.floor(s/86400)}d ago`;
  if(s<31536000)return`${Math.floor(s/2592000)}mo ago`;return`${Math.floor(s/31536000)}y ago`;
}
function fmt(n){return n.replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}
function lc(l){if(!l)return'#5a5960';return{HTML:'#e34c26',CSS:'#563d7c',JavaScript:'#f0d050',TypeScript:'#3b82f6',Python:'#4b8bbe',Java:'#b07219',Vue:'#41b883',PHP:'#4F5D95','C++':'#f34b7d','C#':'#178600'}[l]||'#5a5960'}
function li(l){if(!l)return'<i class="fa-solid fa-code"></i>';return{HTML:'<i class="fa-brands fa-html5"></i>',CSS:'<i class="fa-brands fa-css3-alt"></i>',JavaScript:'<i class="fa-brands fa-js"></i>',TypeScript:'<i class="fa-brands fa-js"></i>',Python:'<i class="fa-brands fa-python"></i>',Java:'<i class="fa-brands fa-java"></i>',PHP:'<i class="fa-brands fa-php"></i>',Vue:'<i class="fa-brands fa-vuejs"></i>',React:'<i class="fa-brands fa-react"></i>'}[l]||'<i class="fa-solid fa-terminal"></i>'}
</script>
</body>
</html>
